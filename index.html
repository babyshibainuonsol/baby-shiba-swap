<!DOCTYPE html>
<html>
<head>
  <title>Baby Shiba Swap</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ff8c42,#ff4d4d);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
">

<div style="
  background:white;
  padding:20px;
  border-radius:20px;
  width:300px;
  text-align:center;
">

  <h2>🐕 Baby Shiba Swap</h2>
  <p style="font-size:12px;color:gray;">
    Where Cute Meets Liquidity
  </p>

  <input 
    id="amount"
    type="number"
    placeholder="Enter amount"
    style="
      width:100%;
      padding:10px;
      margin-top:10px;
      border-radius:10px;
      border:1px solid #ccc;
    "
  >

  <div style="margin-top:10px;">
    <select id="from">
      <option>SOL</option>
      <option>USDC</option>
    </select>

    →

    <select id="to">
      <option>USDC</option>
      <option>SOL</option>
    </select>
  </div>
<button onclick="connectWallet()">
  Connect Wallet
</button>

<button onclick="getQuote()">
  Get Quote
</button>

  <button onclick="getQuote()" style="
    width:100%;
    margin-top:10px;
    padding:10px;
    background:#ff8c42;
    border:none;
    border-radius:10px;
    color:white;
    font-weight:bold;
  ">
    Get Quote
  </button>

  <p id="quote" style="margin-top:10px;"></p>

  <button onclick="swap()" style="
    width:100%;
    margin-top:10px;
    padding:12px;
    background:#ff4d4d;
    border:none;
    border-radius:10px;
    color:white;
    font-weight:bold;
  ">
    Swap 🚀
  </button>

</div>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<script>

async function connectWallet() {
  try {
    const provider = window.phantom?.solana;

    if (!provider || !provider.isPhantom) {
      alert("Open inside Phantom");
      return;
    }

    const resp = await provider.connect();
    alert("Connected: " + resp.publicKey.toString());

  } catch (err) {
    console.error(err);
  }
}

async function getQuote() {
  let amount = document.getElementById("amount").value;
  let from = document.getElementById("from").value;
  let to = document.getElementById("to").value;

  if (!amount) {
    alert("Enter amount");
    return;
  }

  try {
    const res = await fetch(
      "https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=usd"
    );

    const data = await res.json();
    const solPrice = data.solana.usd;

    let result;

    if (from === "SOL" && to === "USDC") {
      result = (amount * solPrice).toFixed(2);
    } else if (from === "USDC" && to === "SOL") {
      result = (amount / solPrice).toFixed(4);
    } else {
      result = amount;
    }

    document.getElementById("quote").innerText =
      "Estimated: " + result + " " + to;

  } catch (err) {
    console.error(err);
    alert("Error fetching price");
  }
}

async function swap() {
  try {
    const provider = window.phantom?.solana;

    if (!provider || !provider.isPhantom) {
      alert("Open inside Phantom");
      return;
    }

    await provider.connect();

    const amountInput = document.getElementById("amount").value;
    const from = document.getElementById("from").value;
    const to = document.getElementById("to").value;

    if (!amountInput) {
      alert("Enter amount");
      return;
    }

    const inputMint =
      from === "SOL"
        ? "So11111111111111111111111111111111111111112"
        : "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v";

    const outputMint =
      to === "SOL"
        ? "So11111111111111111111111111111111111111112"
        : "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v";

    if (inputMint === outputMint) {
      alert("Select different tokens");
      return;
    }

    const amount =
      from === "SOL"
        ? Math.floor(amountInput * 1e9)
        : Math.floor(amountInput * 1e6);

    // STEP 1
    const quoteRes = await fetch(
      `https://quote-api.jup.ag/v6/quote?inputMint=${inputMint}&outputMint=${outputMint}&amount=${amount}&slippageBps=50`
    );

    const quoteData = await quoteRes.json();

    if (!quoteData.data || quoteData.data.length === 0) {
      alert("No route found");
      return;
    }

    const route = quoteData.data[0];

    // STEP 2 (FIXED ENDPOINT ✅)
    const swapRes = await fetch(
      "https://quote-api.jup.ag/v6/swap",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          route: route ✅,
          userPublicKey: provider.publicKey.toString(),
          wrapAndUnwrapSol: true,
        }),
      }
    );

    const swapData = await swapRes.json();

    if (!swapData.swapTransaction) {
      console.log(swapData);
      alert("Swap build failed");
      return;
    }

    // STEP 3
    const txBuf = Uint8Array.from(atob(swapData.swapTransaction), c =>
      c.charCodeAt(0)
    );

    const transaction =
      solanaWeb3.VersionedTransaction.deserialize(txBuf);

    const signed = await provider.signTransaction(transaction);

    const connection = new solanaWeb3.Connection(
      "https://api.mainnet-beta.solana.com"
    );

    const txid = await connection.sendRawTransaction(
      signed.serialize()
    );

    alert("✅ Swap sent! TX: " + txid);

  } catch (err) {
    console.error(err);
    alert("❌ Swap failed: " + err.message);
  }
}

</script>

</body>
</html>
