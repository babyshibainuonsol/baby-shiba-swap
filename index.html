<!DOCTYPE html>
<html>
<head>
  <title>Baby Shiba Swap</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ff8c42,#ff4d4d);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
">

<div style="
  background:white;
  padding:20px;
  border-radius:20px;
  width:300px;
  text-align:center;
">

  <h2>🐕 Baby Shiba Swap</h2>
  <p style="font-size:12px;color:gray;">
    Where Cute Meets Liquidity
  </p>

  <input 
    id="amount"
    type="number"
    placeholder="Enter amount"
    style="
      width:100%;
      padding:10px;
      margin-top:10px;
      border-radius:10px;
      border:1px solid #ccc;
    "
  >

  <div style="margin-top:10px;">
    <select id="from">
      <option>SOL</option>
      <option>USDC</option>
    </select>

    →

    <select id="to">
      <option>USDC</option>
      <option>SOL</option>
    </select>
  </div>
<button onclick="connectWallet()">
  Connect Wallet
</button>

<button onclick="getQuote()">
  Get Quote
</button>

  <button onclick="getQuote()" style="
    width:100%;
    margin-top:10px;
    padding:10px;
    background:#ff8c42;
    border:none;
    border-radius:10px;
    color:white;
    font-weight:bold;
  ">
    Get Quote
  </button>

  <p id="quote" style="margin-top:10px;"></p>

  <button onclick="swap()" style="
    width:100%;
    margin-top:10px;
    padding:12px;
    background:#ff4d4d;
    border:none;
    border-radius:10px;
    color:white;
    font-weight:bold;
  ">
    Swap 🚀
  </button>

</div>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<script>
async function connectWallet() {
  try {
    const provider = window.phantom?.solana;

    if (!provider || !provider.isPhantom) {
      alert("Please open this inside Phantom Wallet browser");
      return;
    }

    const resp = await provider.connect();
    console.log("Connected:", resp.publicKey.toString());

    alert("Wallet connected: " + resp.publicKey.toString());
  } catch (err) {
    console.error(err);
    alert("Connection failed");
  }
}

</script>

<script>
async function getQuote() {
  let amount = document.getElementById("amount").value;
  let from = document.getElementById("from").value;
  let to = document.getElementById("to").value;

  if (!amount) {
    alert("Enter amount");
    return;
  }

  try {
    // Fetch SOL price (USD)
    const res = await fetch(
      "https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=usd"
    );

    const data = await res.json();
    const solPrice = data.solana.usd;

    let result;

    if (from === "SOL" && to === "USDC") {
      result = (amount * solPrice).toFixed(2);
    } else if (from === "USDC" && to === "SOL") {
      result = (amount / solPrice).toFixed(4);
    } else {
      result = amount;
    }

    document.getElementById("quote").innerText =
      "Estimated: " + result + " " + to;

  } catch (err) {
    console.error(err);
    alert("Error fetching price");
  }
}
async function swap() {
  try {
    const provider = window.phantom?.solana;

    if (!provider || !provider.isPhantom) {
      alert("Open inside Phantom");
      return;
    }

    await provider.connect();

    const amountInput = document.getElementById("amount").value;
    const from = document.getElementById("from").value;
    const to = document.getElementById("to").value;

    if (!amountInput) {
      alert("Enter amount");
      return;
    }

    const inputMint =
      from === "SOL"
        ? "So11111111111111111111111111111111111111112"
        : "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v";

    const outputMint =
      to === "SOL"
        ? "So11111111111111111111111111111111111111112"
        : "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v";

    // 🚨 prevent same token swap
    if (inputMint === outputMint) {
      alert("Select two different tokens");
      return;
    }

    const amount =
      from === "SOL"
        ? Math.floor(amountInput * 1e9)
        : Math.floor(amountInput * 1e6);

    // =========================
    // 🟡 STEP 1: GET QUOTE
    // =========================
    const quoteData = await fetch(
  `https://api.jup.ag/swap/v1/quote?inputMint=${inputMint}&outputMint=${outputMint}&amount=${amount}&slippageBps=50`
).then((res) => res.json());

    console.log("QUOTE FULL:", quoteData);

    // 🛑 GUARD #1 (ERROR FROM API)
    if (quoteData.error) {
      alert("Quote error: " + quoteData.error);
      return;
    }

    // 🛑 GUARD #2 (NO ROUTES)
    if (!quoteData || !quoteData.outAmount) {
  alert("No swap route found");
  return;
    }

    const quote = quoteData;

    // =========================
    // 🟡 STEP 2: BUILD SWAP TX
    // =========================
    const swapRes = await fetch(
  "/api/swap",
  {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
      quoteResponse: quoteData,
      userPublicKey: provider.publicKey.toString(),
      wrapAndUnwrapSol: true,
    }),
  }
).then((res) => res.json());

    console.log("SWAP RESPONSE:", swapRes);

    // 🛑 GUARD #3 (NO TRANSACTION RETURNED)
    if (!swapRes.swapTransaction) {
      alert("Swap build failed");
      console.log(swapRes);
      return;
    }

    // =========================
    // 🟡 STEP 3: SEND TX
    // =========================
    const tx = swapRes.swapTransaction;

    const txBuf = Uint8Array.from(atob(tx), (c) =>
      c.charCodeAt(0)
    );

    const transaction =
      solanaWeb3.VersionedTransaction.deserialize(txBuf);

    const signed = await provider.signTransaction(transaction);

    const connection = new solanaWeb3.Connection(
      "https://api.mainnet-beta.solana.com"
    );

    const txid = await connection.sendRawTransaction(
      signed.serialize()
    );

    alert("✅ Swap sent! TX: " + txid);

  } catch (err) {
    console.error(err);
    alert("❌ Swap failed: " + err.message);
  }
}
</script>

</body>
</html>
